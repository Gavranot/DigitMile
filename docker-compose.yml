version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: digitmile-postgres
    env_file:
      - .env
    environment:
      # PostgreSQL uses these specific env vars to create the initial user/database
      POSTGRES_DB: ${DB_NAME:-digitmile}
      POSTGRES_USER: ${DB_USER:-digitmile}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - digitmile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitmile -d digitmile"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digitmile-redis
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - digitmile-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer connection pooler — sits between Django and PostgreSQL.
  # Transaction pooling mode: Django connections are released back to the pool
  # after each COMMIT, so 5 Gunicorn workers share only ~5-10 real PG connections.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: digitmile-pgbouncer
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-digitmile}
      DB_USER: ${DB_USER:-digitmile}
      DB_PASSWORD: ${DB_PASS:-changeme}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 10
      MIN_POOL_SIZE: 3
      MAX_CLIENT_CONN: 100
      # Must match PostgreSQL 16's default auth method (scram-sha-256).
      # Without this, PgBouncer defaults to md5 and PostgreSQL rejects it.
      AUTH_TYPE: scram-sha-256
      # Ignore SET commands that Django sends (timezone, etc.) — safe in transaction mode
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      db:
        condition: service_healthy
    networks:
      - digitmile-network

  # Django Backend (DigitMilePanel)
  backend:
    build:
      context: ./DigitMilePanel
      dockerfile: Dockerfile.compose
    container_name: digitmile-backend
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
      REDIS_URL: redis://redis:6379/1
    volumes:
      # Mount code for development (changes reflect immediately without rebuild)
      - ./DigitMilePanel:/app
      - replay_archives_data:/var/lib/digitmile/replay-archives
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - digitmile-network
    command: >
      sh -c "DB_HOST=db python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn digitmile.wsgi:application --bind 0.0.0.0:8000 --workers 5"

  # Flusher — reads from Redis ingest buffer and bulk-writes to PostgreSQL.
  # Uses the same backend image, just a different entrypoint.
  flusher:
    build:
      context: ./DigitMilePanel
      dockerfile: Dockerfile.compose
    container_name: digitmile-flusher
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - digitmile-network
    command: python manage.py flush_ingest_buffer
    restart: always

  # Nginx Frontend (DigitMile Game)
  frontend:
    build:
      context: ./DigitMile
      dockerfile: Dockerfile
    container_name: digitmile-game
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - digitmile-network

networks:
  digitmile-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  replay_archives_data:
