version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: digitmile-postgres
    env_file:
      - .env
    environment:
      # PostgreSQL uses these specific env vars to create the initial user/database
      POSTGRES_DB: ${DB_NAME:-digitmile}
      POSTGRES_USER: ${DB_USER:-digitmile}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - digitmile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitmile -d digitmile"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: digitmile-redis
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - digitmile-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: PgBouncer was removed from the production stack after benchmarking
  # showed its transaction-pool overhead exceeded its benefit on the
  # 2 vCPU / 3.8 GiB VPS (~5 Gunicorn workers + 1 flusher is a small enough
  # connection footprint that PG handles it natively, and the extra hop +
  # serialization dominated savings). Django now connects directly to `db`
  # with persistent connections (CONN_MAX_AGE=60) and server-side cursors
  # re-enabled. The historical comparison is preserved in
  # benchmarks/overlays/no-pgbouncer.yml + benchmarks/scenarios/before_pgbouncer_*.

  # Django Backend (DigitMilePanel)
  backend:
    build:
      context: ./DigitMilePanel
      dockerfile: Dockerfile.compose
    container_name: digitmile-backend
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
      REDIS_URL: redis://redis:6379/1
    volumes:
      # Mount code for development (changes reflect immediately without rebuild)
      - ./DigitMilePanel:/app
      - replay_archives_data:/var/lib/digitmile/replay-archives
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - digitmile-network
    command: >
      sh -c "DB_HOST=db python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn digitmile.wsgi:application --bind 0.0.0.0:8000 --workers 5"

  # Flusher — reads from Redis ingest buffer and bulk-writes to PostgreSQL.
  # Uses the same backend image, just a different entrypoint.
  flusher:
    build:
      context: ./DigitMilePanel
      dockerfile: Dockerfile.compose
    container_name: digitmile-flusher
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - digitmile-network
    command: python manage.py flush_ingest_buffer
    restart: always

  # Nginx Frontend (DigitMile Game)
  frontend:
    build:
      context: ./DigitMile
      dockerfile: Dockerfile
    container_name: digitmile-game
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - digitmile-network

networks:
  digitmile-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  replay_archives_data:
