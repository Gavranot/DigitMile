version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: digitmile-postgres
    env_file:
      - .env
    environment:
      # PostgreSQL uses these specific env vars to create the initial user/database
      POSTGRES_DB: ${DB_NAME:-digitmile}
      POSTGRES_USER: ${DB_USER:-digitmile}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - digitmile-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitmile -d digitmile"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer connection pooler — sits between Django and PostgreSQL.
  # Transaction pooling mode: Django connections are released back to the pool
  # after each COMMIT, so 5 Gunicorn workers share only ~5-10 real PG connections.
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: digitmile-pgbouncer
    restart: always
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${DB_NAME:-digitmile}
      POSTGRESQL_USERNAME: ${DB_USER:-digitmile}
      POSTGRESQL_PASSWORD: ${DB_PASS:-changeme}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 10
      PGBOUNCER_MIN_POOL_SIZE: 3
      PGBOUNCER_MAX_CLIENT_CONN: 100
      # Ignore SET commands that Django sends (timezone, etc.) — safe in transaction mode
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      db:
        condition: service_healthy
    networks:
      - digitmile-network

  # Django Backend (DigitMilePanel)
  backend:
    build:
      context: ./DigitMilePanel
      dockerfile: Dockerfile.compose
    container_name: digitmile-backend
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
    volumes:
      # Mount code for development (changes reflect immediately without rebuild)
      - ./DigitMilePanel:/app
      - replay_archives_data:/var/lib/digitmile/replay-archives
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - digitmile-network
    command: >
      sh -c "DB_HOST=db python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn digitmile.wsgi:application --bind 0.0.0.0:8000 --workers 5"

  # Nginx Frontend (DigitMile Game)
  frontend:
    build:
      context: ./DigitMile
      dockerfile: Dockerfile
    container_name: digitmile-game
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - digitmile-network

networks:
  digitmile-network:
    driver: bridge

volumes:
  postgres_data:
  replay_archives_data:
