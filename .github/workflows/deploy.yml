name: Deploy to Server

on:
  workflow_call:
    inputs:
      TARGET_ENV:
        required: true
        type: string
      REF:
        required: false
        type: string
        default: "master"

jobs:
  deploy-configuration:
    name: Upload Configuration Files
    runs-on: ubuntu-latest
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF }}
          fetch-depth: 1

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp docker-compose.yml deploy/
          cp docker-compose.prod.yml deploy/
          cp -r nginx-proxy deploy/
          cp -r benchmarks deploy/
          cp -r compactor deploy/

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          source: "deploy/*"
          target: /var/www/digitmile
          strip_components: 1

  setup-ssl:
    name: Initialize or Recover SSL Certificate
    needs: deploy-configuration
    runs-on: ubuntu-latest
    if: inputs.TARGET_ENV == 'prod'
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}
      DOMAIN: ${{ vars.DOMAIN }}
      EMAIL: ${{ vars.SSL_EMAIL }}

    steps:
      - name: Setup Let's Encrypt SSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          script: |
            cd /var/www/digitmile

            # Ensure certbot directories exist
            mkdir -p certbot/conf certbot/www

            CERT_FILE="certbot/conf/live/${{ env.DOMAIN }}/fullchain.pem"

            # Check if certificate exists using docker (avoids permission issues).
            # Skip re-issue only if cert is Let's Encrypt AND has >30 days until expiry.
            if [ -d "certbot/conf/live/${{ env.DOMAIN }}" ]; then
              ISSUER=$(docker run --rm -v "$(pwd)/certbot/conf:/etc/letsencrypt" \
                alpine/openssl x509 -in "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" -noout -issuer 2>/dev/null || echo "")

              # -checkend returns non-zero if cert expires within the given seconds (30 days).
              if docker run --rm -v "$(pwd)/certbot/conf:/etc/letsencrypt" \
                  alpine/openssl x509 -in "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" -noout -checkend 2592000 >/dev/null 2>&1; then
                NOT_EXPIRING=true
              else
                NOT_EXPIRING=false
              fi

              if echo "$ISSUER" | grep -q "Let's Encrypt" && [ "$NOT_EXPIRING" = "true" ]; then
                echo "✓ Valid Let's Encrypt certificate for ${{ env.DOMAIN }} (>30 days remaining), skipping..."
                exit 0
              else
                echo "Certificate needs (re)issue — issuer: $ISSUER, valid_for_30d: $NOT_EXPIRING"
              fi
            fi

            echo "Initializing Let's Encrypt certificate for ${{ env.DOMAIN }}..."

            # Clean up any dummy/invalid certificates (using docker to handle root-owned files)
            docker run --rm -v "$(pwd)/certbot/conf:/etc/letsencrypt" alpine \
              sh -c "rm -rf /etc/letsencrypt/live/${{ env.DOMAIN }} /etc/letsencrypt/archive/${{ env.DOMAIN }} /etc/letsencrypt/renewal/${{ env.DOMAIN }}.conf" 2>/dev/null || true

            # Stop all containers to free port 80
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down 2>/dev/null || true

            # Also stop any standalone containers that might be using port 80
            docker stop $(docker ps -q --filter "publish=80") 2>/dev/null || true

            # Verify port 80 is free
            if ss -tlnp 2>/dev/null | grep -q ":80 "; then
              echo "⚠ Port 80 may be in use, attempting anyway..."
            fi

            # Use standalone mode - certbot runs its own temporary webserver
            docker run --rm -p 80:80 \
              -v "$(pwd)/certbot/conf:/etc/letsencrypt" \
              -v "$(pwd)/certbot/www:/var/www/certbot" \
              certbot/certbot certonly --standalone \
              --email ${{ env.EMAIL }} \
              --agree-tos \
              --no-eff-email \
              --non-interactive \
              --keep-until-expiring \
              -d ${{ env.DOMAIN }}

            # Verify certificate was obtained and is from Let's Encrypt
            if [ -d "certbot/conf/live/${{ env.DOMAIN }}" ]; then
              ISSUER=$(docker run --rm -v "$(pwd)/certbot/conf:/etc/letsencrypt" \
                alpine/openssl x509 -in "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" -noout -issuer 2>/dev/null || echo "")
              
              if echo "$ISSUER" | grep -q "Let's Encrypt"; then
                echo "✓ SSL certificate obtained successfully!"
              else
                echo "⚠ Certificate exists but issuer check inconclusive: $ISSUER"
                echo "Continuing anyway..."
              fi
            else
              echo "✗ Failed to obtain SSL certificate"
              exit 1
            fi

  deploy-containers:
    name: Deploy Docker Containers
    needs: setup-ssl
    runs-on: ubuntu-latest
    if: always() && needs.deploy-configuration.result == 'success'
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}

    steps:
      - name: Deploy and Start Containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_VARS: |
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
            BENCHMARK_BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:${{ inputs.TARGET_ENV }}-latest
          DB_VARS: |
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_HOST=${{ vars.DB_HOST }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_PORT=${{ vars.DB_PORT }}
          DJANGO_VARS: |
            DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}
            DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
            DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            SITE_URL=${{ vars.SITE_URL }}
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
            SERVER_IP=${{ vars.SERVER_IP }}
          EMAIL_VARS: |
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            EMAIL_HOST=${{ vars.EMAIL_HOST }}
            EMAIL_PORT=${{ vars.EMAIL_PORT }}
            EMAIL_HOST_USER=${{ vars.EMAIL_HOST_USER }}
            EMAIL_BACKEND=${{ vars.EMAIL_BACKEND }}
            EMAIL_USE_TLS=${{ vars.EMAIL_USE_TLS }}
          MISC_VARS: |
            GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            DEBUG=${{ vars.DEBUG }}
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          envs: DOCKER_VARS,DB_VARS,DJANGO_VARS,EMAIL_VARS,MISC_VARS
          script: |
            cd /var/www/digitmile
            
            # Create the .env file by printing the pre-formatted blocks
            printf "%s\n%s\n%s\n%s\n" "$DOCKER_VARS" "$DB_VARS" "$DJANGO_VARS" "$EMAIL_VARS" "$MISC_VARS" > .env

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-game:${{ inputs.TARGET_ENV }}-latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:${{ inputs.TARGET_ENV }}-latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-nginx-proxy:${{ inputs.TARGET_ENV }}-latest

            # Re-tag backend image so benchmark tooling can find it by the expected local name
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:${{ inputs.TARGET_ENV }}-latest digitmile-backend:latest

            # Verify .env file creation
            if [ ! -f .env ]; then
              echo "ERROR: .env file was not generated!"
              exit 1
            fi

            # Stop and remove old containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down

            # Start new containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Wait for backend to be healthy
            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
              if docker compose exec -T backend python -c "import django; django.setup()" 2>/dev/null; then
                echo "Backend is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            # Verify migrations ran successfully
            docker compose logs backend | grep -q "Operations to perform" && echo "✓ Migrations completed" || echo "⚠ Check migration logs"

            # Clean up old images
            docker image prune -af

            echo "Deployment complete!"