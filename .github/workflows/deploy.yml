name: Deploy to Server

on:
  workflow_call:
    inputs:
      TARGET_ENV:
        required: true
        type: string
      REF:
        required: false
        type: string
        default: "master"

jobs:
  deploy-configuration:
    name: Upload Configuration Files
    runs-on: ubuntu-latest
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF }}
          fetch-depth: 1

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp docker-compose.yml deploy/
          cp docker-compose.prod.yml deploy/
          cp -r nginx-proxy deploy/

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          source: "deploy/*"
          target: /var/www/digitmile
          strip_components: 1

  deploy-containers:
    name: Deploy Docker Containers
    needs: deploy-configuration
    runs-on: ubuntu-latest
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}

    steps:
      - name: Deploy and Start Containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Using YAML | keeps the newlines exactly as typed, forming valid .env blocks
          DOCKER_VARS: |
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
          DB_VARS: |
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_HOST=${{ vars.DB_HOST }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_PORT=${{ vars.DB_PORT }}
          DJANGO_VARS: |
            DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}
            DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
            DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            SITE_URL=${{ vars.SITE_URL }}
            ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
            SERVER_IP=${{ vars.SERVER_IP }}
          EMAIL_VARS: |
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            EMAIL_HOST=${{ vars.EMAIL_HOST }}
            EMAIL_PORT=${{ vars.EMAIL_PORT }}
            EMAIL_HOST_USER=${{ vars.EMAIL_HOST_USER }}
            EMAIL_BACKEND=${{ vars.EMAIL_BACKEND }}
            EMAIL_USE_TLS=${{ vars.EMAIL_USE_TLS }}
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          # Pass the multi-line blocks to the server
          envs: DOCKER_VARS,DB_VARS,DJANGO_VARS,EMAIL_VARS
          script: |
            cd /var/www/digitmile
            
            # Create the .env file by printing the pre-formatted blocks
            printf "%s\n%s\n%s\n%s\n" "$DOCKER_VARS" "$DB_VARS" "$DJANGO_VARS" "$EMAIL_VARS" > .env

            # Login to Docker Hub using the variables we just injected
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-game:${{ inputs.TARGET_ENV }}-latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:${{ inputs.TARGET_ENV }}-latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-nginx-proxy:${{ inputs.TARGET_ENV }}-latest

            # Verify .env file creation
            if [ ! -f .env ]; then
              echo "ERROR: .env file was not generated!"
              exit 1
            fi

            # Stop and remove old containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down

            # Start new containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Wait for backend to be healthy
            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
              if docker compose exec -T backend python -c "import django; django.setup()" 2>/dev/null; then
                echo "Backend is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            # Verify migrations ran successfully
            docker compose logs backend | grep -q "Operations to perform" && echo "✓ Migrations completed" || echo "⚠ Check migration logs"

            # Clean up old images
            docker image prune -af

            echo "Deployment complete!"

  setup-ssl:
    name: Initialize SSL Certificates (First Deploy Only)
    needs: deploy-containers
    runs-on: ubuntu-latest
    if: inputs.TARGET_ENV == 'prod'
    env:
      HOST: ${{ vars[format('{0}_HOST', inputs.TARGET_ENV)] }}
      USERNAME: ${{ vars[format('{0}_USERNAME', inputs.TARGET_ENV)] }}
      PORT: ${{ vars[format('{0}_PORT', inputs.TARGET_ENV)] }}
      DOMAIN: ${{ vars.DOMAIN }}
      EMAIL: ${{ vars.SSL_EMAIL }}

    steps:
      - name: Setup Let's Encrypt SSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          port: ${{ env.PORT }}
          key: ${{ secrets[format('{0}_SSH_PRIVATE_KEY', inputs.TARGET_ENV)] }}
          script: |
            cd /var/www/digitmile

            if [ ! -d "certbot/conf/live/${{ env.DOMAIN }}" ]; then
              echo "Initializing Let's Encrypt certificate..."
              
              mkdir -p certbot/conf certbot/www
              
              # Create dummy certificate so nginx can start
              mkdir -p certbot/conf/live/${{ env.DOMAIN }}
              openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                -keyout certbot/conf/live/${{ env.DOMAIN }}/privkey.pem \
                -out certbot/conf/live/${{ env.DOMAIN }}/fullchain.pem \
                -subj '/CN=localhost'
              
              # Restart nginx with dummy cert
              docker compose -f docker-compose.yml -f docker-compose.prod.yml restart nginx-proxy
              
              # Wait for nginx to be ready
              sleep 15
              
              # Now request the real certificate
              docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot certonly --webroot \
                --webroot-path=/var/www/certbot \
                --email ${{ env.EMAIL }} \
                --agree-tos \
                --no-eff-email \
                --non-interactive \
                -d ${{ env.DOMAIN }} -d www.${{ env.DOMAIN }}
              
              # Reload nginx with real cert
              docker compose -f docker-compose.yml -f docker-compose.prod.yml restart nginx-proxy
              
              echo "✓ SSL certificate obtained!"
            fi