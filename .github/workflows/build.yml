name: Build and Push Docker Images

on:
  workflow_call:
    inputs:
      TARGET_ENV:
        required: true
        type: string
      REF:
        required: false
        type: string
        default: "master"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build_game_docker:
    name: Build Game Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF }}
          fetch-depth: 1
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Alternative: Login to GitHub Container Registry
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-game
          # For GHCR: ghcr.io/${{ github.repository_owner }}/digitmile-game
          tags: |
            type=raw,value=${{ inputs.TARGET_ENV }}-latest
            type=raw,value=${{ inputs.TARGET_ENV }}-${{ github.sha }}

      - name: Build and Push Game Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./DigitMile
          file: ./DigitMile/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-game:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-game:buildcache,mode=max

  build_backend_docker:
    name: Build Backend Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend
          tags: |
            type=raw,value=${{ inputs.TARGET_ENV }}-latest
            type=raw,value=${{ inputs.TARGET_ENV }}-${{ github.sha }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./DigitMilePanel
          file: ./DigitMilePanel/Dockerfile.compose
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-backend:buildcache,mode=max

  build_nginx_proxy_docker:
    name: Build NGINX Proxy Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.REF }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/digitmile-nginx-proxy
          tags: |
            type=raw,value=${{ inputs.TARGET_ENV }}-latest
            type=raw,value=${{ inputs.TARGET_ENV }}-${{ github.sha }}

      - name: Build and Push NGINX Proxy Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx-proxy
          file: ./nginx-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-nginx-proxy:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/digitmile-nginx-proxy:buildcache,mode=max
