version: '3.8'

# Production Docker Compose with Let's Encrypt SSL
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  # NGINX Reverse Proxy (production with Let's Encrypt)
  # Reloads every 6h so renewed Let's Encrypt certs are picked up without a restart.
  nginx-proxy:
    image: ${DOCKERHUB_USERNAME:-your-username}/digitmile-nginx-proxy:${TARGET_ENV:-prod}-latest
    container_name: digitmile-nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx.conf.production:/etc/nginx/conf.d/default.conf:rw
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    command: /bin/sh -c "trap exit TERM; while :; do sleep 6h & wait $${!}; nginx -s reload 2>/dev/null || true; done & nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    networks:
      - digitmile-network

  # Certbot for Let's Encrypt SSL
  # Uses --webroot so renewal works while nginx-proxy holds port 80.
  # nginx-proxy serves /.well-known/acme-challenge/ from /var/www/certbot.
  certbot:
    image: certbot/certbot:latest
    container_name: digitmile-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - digitmile-network

  db:
    # In production, you might use a managed database service instead
    restart: always
    # Remove port exposure in production (only backend needs access)
    ports: !override []
    # Tuned for a ~4 GiB server.
    # synchronous_commit=off is the biggest write-throughput win: transactions are
    # acknowledged before WAL flush, eliminating per-commit fsync latency.
    # Risk: up to ~600ms of committed transactions can be lost on a hard crash.
    # This is acceptable for game telemetry (no financial data).
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1500MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c synchronous_commit=off
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1

  backend:
    restart: always
    # Use pre-built image from Docker Hub/Registry
    image: ${DOCKERHUB_USERNAME:-your-username}/digitmile-backend:${TARGET_ENV:-prod}-latest
    volumes: !override
      - replay_archives_data:/var/lib/digitmile/replay-archives
    # Keep env_file - .env stays on server only (root directory)
    env_file:
      - .env
    environment:
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
    # Remove port exposure - use reverse proxy in production
    ports: !override []

  flusher:
    # Use the same pre-built backend image
    image: ${DOCKERHUB_USERNAME:-your-username}/digitmile-backend:${TARGET_ENV:-prod}-latest

  frontend:
    restart: always
    # Use pre-built image from Docker Hub/Registry
    image: ${DOCKERHUB_USERNAME:-your-username}/digitmile-game:${TARGET_ENV:-prod}-latest
    # Remove port exposure - use reverse proxy
    ports: !override []

  # Weekly compaction cron. Posts to the backend's internal trigger
  # endpoint on the schedule defined by CRON_SCHEDULE (Friday 20:00
  # Europe/Skopje by default). Compacts the previous Mon-Sun week, which
  # ended five days earlier — gives a comfortable buffer before teachers
  # arrive Monday morning. Holds the shared INTERNAL_API_TOKEN; no database
  # credentials and no application code. The backend handles the actual
  # compaction out-of-band, so this container's curl call is short
  # (seconds), not a long-lived job.
  compactor:
    build:
      context: ./compactor
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-your-username}/digitmile-compactor:${TARGET_ENV:-prod}-latest
    container_name: digitmile-compactor
    restart: always
    env_file:
      - .env
    environment:
      CRON_SCHEDULE: "0 20 * * 5"
      BACKEND_URL: http://backend:8000
      TRIGGER_PATH: /panel/api/internal/compaction/run-weekly/
      MAX_WORKERS: "2"
      TZ: Europe/Skopje
    depends_on:
      - backend
    networks:
      - digitmile-network

volumes:
  replay_archives_data:
