# Benchmark overlay: bypass PgBouncer.
#
# Reverts optimization A (PgBouncer transaction pooling + Django settings that
# depend on it) by pointing the backend and flusher directly at benchmark-db,
# and re-enabling Django connection reuse + server-side cursors.
#
# The pgbouncer service is left declared so the depends_on graph in the base
# compose file still resolves, but its image is replaced with a no-op
# busybox container so PgBouncer itself never runs.
#
# Apply via scenario JSON: "compose_overlays": ["no-pgbouncer.yml"]
#
# HISTORICAL NOTE: as of the PgBouncer-removal change, this overlay's
# configuration (direct PG + CONN_MAX_AGE=60 + server-side cursors) IS what
# production uses. The benchmark stack's base still has benchmark-pgbouncer
# enabled by default so the historical "with-PgBouncer" comparison from the
# thesis benchmarks remains reproducible without overlay edits. Future thesis
# runs that want to match production should apply this overlay.

services:
  benchmark-pgbouncer:
    image: busybox:latest
    command: sleep infinity
    healthcheck:
      disable: true

  benchmark-backend:
    environment:
      DB_HOST: benchmark-db
      DB_CONN_MAX_AGE: "60"
      DB_DISABLE_SERVER_SIDE_CURSORS: "False"

  benchmark-flusher:
    environment:
      DB_HOST: benchmark-db
      DB_CONN_MAX_AGE: "60"
      DB_DISABLE_SERVER_SIDE_CURSORS: "False"
