services:
  benchmark-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BENCHMARK_DB_NAME:-digitmile_benchmark}
      POSTGRES_USER: ${BENCHMARK_DB_USER:-digitmile}
      POSTGRES_PASSWORD: ${BENCHMARK_DB_PASS:-benchmark-pass}
    # Keep in sync with docker-compose.prod.yml so benchmark results reflect
    # production PostgreSQL behaviour.
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c synchronous_commit=off
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${BENCHMARK_DB_USER:-digitmile} -d ${BENCHMARK_DB_NAME:-digitmile_benchmark}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - benchmark-network
    volumes:
      - benchmark_postgres_data:/var/lib/postgresql/data

  # PgBouncer for the benchmark stack — mirrors production topology.
  # benchmark-backend connects here, not directly to benchmark-db.
  benchmark-pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: benchmark-db
      DB_PORT: 5432
      DB_NAME: ${BENCHMARK_DB_NAME:-digitmile_benchmark}
      DB_USER: ${BENCHMARK_DB_USER:-digitmile}
      DB_PASSWORD: ${BENCHMARK_DB_PASS:-benchmark-pass}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 10
      MIN_POOL_SIZE: 3
      MAX_CLIENT_CONN: 100
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      benchmark-db:
        condition: service_healthy
    networks:
      - benchmark-network

  benchmark-backend:
    image: gashmurble/digitmile-backend:prod-latest
    env_file:
      - ../.env
    environment:
      DB_HOST: benchmark-pgbouncer
      DB_NAME: ${BENCHMARK_DB_NAME:-digitmile_benchmark}
      DB_USER: ${BENCHMARK_DB_USER:-digitmile}
      DB_PASS: ${BENCHMARK_DB_PASS:-benchmark-pass}
      DB_PORT: 5432
      SERVER_IP: benchmark-backend
      ALLOWED_HOSTS: benchmark-backend,localhost,127.0.0.1
      REPLAY_ARCHIVE_ROOT: /var/lib/digitmile/replay-archives
      BENCHMARK_TIME_OVERRIDE_ENABLED: "True"
      DJANGO_SUPERUSER_USERNAME: benchmarkadmin
      DJANGO_SUPERUSER_EMAIL: benchmark-admin@example.com
      DJANGO_SUPERUSER_PASSWORD: benchmark-admin-password
    depends_on:
      benchmark-db:
        condition: service_healthy
      benchmark-pgbouncer:
        condition: service_started
    command: >
      sh -c "DB_HOST=benchmark-db python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn digitmile.wsgi:application --bind 0.0.0.0:8000 --workers 5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/panel/health/', timeout=5).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - benchmark-network
    volumes:
      - benchmark_replay_archives:/var/lib/digitmile/replay-archives

networks:
  benchmark-network:
    driver: bridge

volumes:
  benchmark_postgres_data:
  benchmark_replay_archives:
