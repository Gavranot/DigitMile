server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;

    # Proper MIME types for Unity WebGL
    types {
        application/wasm wasm;
    }

    # Enable gzip compression for uncompressed Unity files
    gzip on;
    gzip_types application/javascript application/wasm application/octet-stream;
    gzip_vary on;

    # Handle Unity's precompressed files (.gz) if they exist
    location ~ \.js\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/javascript;
    }

    location ~ \.wasm\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/wasm;
    }

    location ~ \.data\.gz$ {
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
    }

    # Handle Brotli compressed files (.br) if they exist
    location ~ \.js\.br$ {
        add_header Content-Encoding br;
        default_type application/javascript;
    }

    location ~ \.wasm\.br$ {
        add_header Content-Encoding br;
        default_type application/wasm;
    }

    location ~ \.data\.br$ {
        add_header Content-Encoding br;
        default_type application/octet-stream;
    }

    # Serve uncompressed .wasm files with correct MIME type
    location ~ \.wasm$ {
        default_type application/wasm;
        add_header Cross-Origin-Embedder-Policy require-corp;
        add_header Cross-Origin-Opener-Policy same-origin;
    }

    # Serve uncompressed .data files
    location ~ \.data$ {
        default_type application/octet-stream;
    }

    location /game/i18n/ {
        alias /usr/share/nginx/html/i18n/;
        add_header Cache-Control "no-cache";
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;
        
        # Required for Unity WebGL with SharedArrayBuffer (threading)
        add_header Cross-Origin-Embedder-Policy require-corp;
        add_header Cross-Origin-Opener-Policy same-origin;
    }
}